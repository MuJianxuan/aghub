name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    CARGO_TERM_COLOR: always

jobs:
    check:
        name: Check (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        steps:
            - uses: actions/checkout@v4

            - name: Install System Dependencies (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Setup Bun & Node
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install @antfu/ni
              run: bun i -g @antfu/ni

            - name: Install just
              uses: taiki-e/install-action@v2
              with:
                  tool: just

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2

            - name: Install fama
              run: cargo install fama

            - name: Install frontend dependencies
              run: cd crates/desktop && bun install

            - name: Format Check
              if: matrix.os == 'ubuntu-latest'
              run: |
                  just fmt
                  git diff --exit-code

            - name: Lint
              run: just lint

            - name: Test
              run: |
                  just test
                  just integration-test || true

            - name: Build
              run: |
                  just build
                  cd crates/desktop && bun run build
